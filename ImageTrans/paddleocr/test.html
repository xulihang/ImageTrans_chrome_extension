<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PaddleOCR 测试</title>
<style>
  body { font-family: sans-serif; max-width: 900px; margin: 0 auto; padding: 20px; }
  #status { color: #666; margin: 10px 0; }
  #container { display: flex; gap: 20px; margin-top: 20px; }
  #image-area { flex: 1; }
  #image-area img { max-width: 100%; border: 1px solid #ccc; }
  #result-area { flex: 1; }
  .box-item { border: 1px solid #ddd; padding: 8px; margin-bottom: 8px; border-radius: 4px; }
  .box-item .text { font-size: 14px; }
  .box-item .coord { font-size: 11px; color: #999; }
  canvas { border: 1px solid #ccc; max-width: 100%; }
  #file-input { margin: 10px 0; }
</style>
</head>
<body>
<h1>PaddleOCR 本地测试</h1>
<div id="status">正在加载依赖库...</div>
<input type="file" id="file-input" accept="image/*" disabled>
<div id="container">
  <div id="image-area">
    <canvas id="canvas"></canvas>
  </div>
  <div id="result-area">
    <h3>识别结果</h3>
    <div id="boxes"></div>
  </div>
</div>

<!-- 本地依赖库 -->
<script src="opencv.js"></script>
<script src="ort.min.js"></script>
<script src="esearch-ocr/dist/esearch-ocr.umd.cjs"></script>

<script>
const statusEl = document.getElementById('status');
const fileInput = document.getElementById('file-input');
const canvas = document.getElementById('canvas');
const boxesEl = document.getElementById('boxes');
const ctx = canvas.getContext('2d');

const Paddle = window['esearch-ocr'];

// 配置 ONNX Runtime WASM 路径
if (ort.env && ort.env.wasm) {
  ort.env.wasm.wasmPaths = './';
}

const DET_PATH = 'ppocr_v5_mobile_det.onnx';
const REC_PATH = 'ppocr_v5_mobile_rec.onnx';
const DIC_PATH = 'ppocrv5_dict.txt';

let paddleReady = false;

// --- 合并逻辑 ---
function mergeTextBoxes(items) {
  if (items.length === 0) return [];

  function boxHeight(box) {
    var minY = Math.min(box[0][1], box[1][1]);
    var maxY = Math.max(box[2][1], box[3][1]);
    return maxY - minY;
  }

  function xOverlapRatio(a, b) {
    var aMinX = Math.min(a[0][0], a[3][0]);
    var aMaxX = Math.max(a[1][0], a[2][0]);
    var bMinX = Math.min(b[0][0], b[3][0]);
    var bMaxX = Math.max(b[1][0], b[2][0]);
    var aW = aMaxX - aMinX;
    var bW = bMaxX - bMinX;
    var marginA = Math.min(aW * 0.25, 20);
    var marginB = Math.min(bW * 0.25, 20);
    var overlap = Math.min(aMaxX + marginA, bMaxX + marginB) - Math.max(aMinX - marginA, bMinX - marginB);
    if (overlap <= 0) return 0;
    var minW = Math.min(aW, bW);
    return overlap / minW;
  }

  // X 间距不超过 15px 即视为可合并
  function xCloseEnough(a, b) {
    var aMinX = Math.min(a[0][0], a[3][0]);
    var aMaxX = Math.max(a[1][0], a[2][0]);
    var bMinX = Math.min(b[0][0], b[3][0]);
    var bMaxX = Math.max(b[1][0], b[2][0]);
    var gap;
    if (aMaxX < bMinX) gap = bMinX - aMaxX;
    else if (bMaxX < aMinX) gap = aMinX - bMaxX;
    else gap = 0;
    return gap <= 15;
  }

  // Y 重叠比例：0 = 不相交，1 = 完全重叠（带容差，上下各扩展 15% 高度或 5px）
  function yOverlapRatio(a, b) {
    var aMinY = Math.min(a[0][1], a[1][1]);
    var aMaxY = Math.max(a[2][1], a[3][1]);
    var bMinY = Math.min(b[0][1], b[1][1]);
    var bMaxY = Math.max(b[2][1], b[3][1]);
    var aH = aMaxY - aMinY;
    var bH = bMaxY - bMinY;
    var marginA = Math.min(aH * 0.25, 30);
    var marginB = Math.min(bH * 0.25, 30);
    var overlap = Math.min(aMaxY + marginA, bMaxY + marginB) - Math.max(aMinY - marginA, bMinY - marginB);
    if (overlap <= 0) return 0;
    var minH = Math.min(aH, bH);
    return overlap / minH;
  }

  // Y 间距不超过 15px 即视为可合并
  function yCloseEnough(a, b) {
    var aMinY = Math.min(a[0][1], a[1][1]);
    var aMaxY = Math.max(a[2][1], a[3][1]);
    var bMinY = Math.min(b[0][1], b[1][1]);
    var bMaxY = Math.max(b[2][1], b[3][1]);
    var gap;
    if (aMaxY < bMinY) gap = bMinY - aMaxY;
    else if (bMaxY < aMinY) gap = aMinY - bMaxY;
    else gap = 0;
    return gap <= 15;
  }

  function unionBox(group) {
    var allX = [], allY = [];
    group.forEach(function(item) {
      item.box.forEach(function(p) { allX.push(p[0]); allY.push(p[1]); });
    });
    var minX = Math.min.apply(null, allX);
    var maxX = Math.max.apply(null, allX);
    var minY = Math.min.apply(null, allY);
    var maxY = Math.max.apply(null, allY);
    return [[minX, minY], [maxX, minY], [maxX, maxY], [minX, maxY]];
  }

  // 按 XYCut 排序（从上到下，从左到右）
  var heights = items.map(function(item) {
    return Math.abs(item.box[2][1] - item.box[0][1]);
  }).sort(function(a, b) { return a - b; });
  var medianHeight = heights[Math.floor(heights.length / 2)] || 10;
  var lineThreshold = medianHeight * 0.5;

  var sorted = items.slice().sort(function(a, b) {
    var aY = a.box[0][1];
    var bY = b.box[0][1];
    if (Math.abs(aY - bY) < lineThreshold) {
      return a.box[0][0] - b.box[0][0];
    }
    return aY - bY;
  });

  // 检测是否为竖排文字（多数 box 高度 > 宽度）
  var tallCount = 0;
  items.forEach(function(item) {
    var w = item.box[1][0] - item.box[0][0];
    var h = item.box[2][1] - item.box[0][1];
    if (h > w) tallCount++;
  });
  var isVertical = tallCount > items.length / 2;

  // Phase 1: 左右合并 — 按 Y 重叠 + X 接近合并成行
  var lines = [];
  var used1 = new Array(sorted.length).fill(false);

  for (var i = 0; i < sorted.length; i++) {
    if (used1[i]) continue;
    var line = [sorted[i]];
    used1[i] = true;

    var changed = true;
    while (changed) {
      changed = false;
      for (var j = 0; j < sorted.length; j++) {
        if (used1[j]) continue;
        for (var k = 0; k < line.length; k++) {
          if (yOverlapRatio(line[k].box, sorted[j].box) >= 0.15 && xCloseEnough(line[k].box, sorted[j].box)) {
            line.push(sorted[j]);
            used1[j] = true;
            changed = true;
            break;
          }
        }
      }
    }
    line.sort(function(a, b) { return a.box[0][0] - b.box[0][0]; });
    lines.push(line);
  }

  // Phase 2: 上下合并 — 按 X 重叠 + Y 接近合并行组成块
  var groups = [];
  var used2 = new Array(lines.length).fill(false);

  for (var i = 0; i < lines.length; i++) {
    if (used2[i]) continue;
    var group = lines[i].slice();
    used2[i] = true;

    var changed = true;
    while (changed) {
      changed = false;
      for (var j = 0; j < lines.length; j++) {
        if (used2[j]) continue;
        for (var k = 0; k < group.length; k++) {
          for (var l = 0; l < lines[j].length; l++) {
            if (xOverlapRatio(group[k].box, lines[j][l].box) >= 0.15 && yCloseEnough(group[k].box, lines[j][l].box)) {
              group = group.concat(lines[j]);
              used2[j] = true;
              changed = true;
              break;
            }
          }
          if (changed) break;
        }
      }
    }
    groups.push(group);
  }
  console.log('Lines:', lines);
  console.log('Groups:', groups);
   console.log('isVertical:', isVertical);
  var merged = groups.map(function(group) {
    if (isVertical) {
      // 竖排文字：组内从右往左排列
      group.sort(function(a, b) { return b.box[0][0] - a.box[0][0]; });
    } else {
      // 横排文字行：xycut排序
      group.sort(function(a, b) {
        var ya = a.box[0][1], yb = b.box[0][1];
        var ha = Math.abs(a.box[3][1] - a.box[0][1]);
        var hb = Math.abs(b.box[3][1] - b.box[0][1]);
        var minH = Math.min(ha, hb);
        if (Math.abs(ya - yb) < minH * 0.5) {
          return a.box[0][0] - b.box[0][0];
        }
        return ya - yb;
      });
    }
    console.log('sorted:', group);
    var texts = group.map(function(item) { return item.text; });
    var box = unionBox(group);
    return { text: texts.join(' '), box: box };
  });

  // 竖排文字：组间也从右往左排列
  if (isVertical) {
    merged.sort(function(a, b) { return b.box[0][0] - a.box[0][0]; });
  }

  return merged;
}

var _colorIdx = 0;
var _colors = ['red', 'blue', 'green', 'orange', 'purple', 'brown', 'cyan', 'magenta'];
function getRandomColor() {
  return _colors[_colorIdx++ % _colors.length];
}

function escapeHtml(str) {
  return str.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
}

async function init() {
  try {
    statusEl.textContent = '正在加载字典...';
    const res = await fetch(DIC_PATH);
    const dic = await res.text();

    statusEl.textContent = '正在初始化 PaddleOCR...';
    await Paddle.init({
      detPath: DET_PATH,
      recPath: REC_PATH,
      dic: dic,
      ort: ort,
      node: false,
      cv: cv
    });

    paddleReady = true;
    statusEl.textContent = 'PaddleOCR 初始化完成，请选择图片';
    fileInput.disabled = false;
  } catch (err) {
    statusEl.textContent = '初始化失败: ' + err.message;
    console.error(err);
  }
}

fileInput.addEventListener('change', async (e) => {
  const file = e.target.files[0];
  if (!file) return;

  statusEl.textContent = '正在加载图片...';
  const img = new Image();
  img.src = URL.createObjectURL(file);
  await new Promise(resolve => { img.onload = resolve; });

  canvas.width = img.naturalWidth;
  canvas.height = img.naturalHeight;
  ctx.drawImage(img, 0, 0);

  statusEl.textContent = '正在识别...';
  try {
    const result = await Paddle.ocr(img);
    console.log(result);

    boxesEl.innerHTML = '';
    _colorIdx = 0;

    // 使用 result.src 手动合并相邻文字行
    const srcItems = result.src.filter(function(item) {
      return item.text && item.text.trim() !== '';
    });

    srcItems.forEach(function(srcItem) {
      srcItem.box.forEach(function(box) {
        if (box[0] < 0 || box[1] < 0) {
          let x = Math.abs(box[1]);
          let y = Math.abs(box[0]);
          box[0] = x;
          box[1] = y;
          console.warn('检测到负坐标，已修正:', box);
        }
      });
    });
    console.log(srcItems);
    console.log(result);
    const mergedGroups = mergeTextBoxes(srcItems);

    mergedGroups.forEach(function(group) {
      const box = group.box;
      const text = group.text;

      // 绘制识别框
      ctx.strokeStyle = getRandomColor();
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.moveTo(box[0][0], box[0][1]);
      ctx.lineTo(box[1][0], box[1][1]);
      ctx.lineTo(box[2][0], box[2][1]);
      ctx.lineTo(box[3][0], box[3][1]);
      ctx.closePath();
      ctx.stroke();

      // 显示文字
      const boxEl = document.createElement('div');
      boxEl.className = 'box-item';
      boxEl.innerHTML = '<div class="text">' + escapeHtml(text) + '</div><div class="coord">[' + box[0].join(',') + '] [' + box[2].join(',') + ']</div>';
      boxesEl.appendChild(boxEl);
    });

    statusEl.textContent = '识别完成，共 ' + srcItems.length + ' 个文本片段，合并为 ' + mergedGroups.length + ' 个区域';
  } catch (err) {
    statusEl.textContent = '识别失败: ' + err.message;
    console.error(err);
  }
});

init();
</script>
</body>
</html>
