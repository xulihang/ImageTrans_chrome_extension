<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>日语片假名注音测试 (Kuroshiro Demo)</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bulma@0.9.4/css/bulma.min.css">
    
    <script src="https://cdn.jsdelivr.net/npm/kuroshiro/dist/kuroshiro.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/kuroshiro-analyzer-kuromoji/dist/kuroshiro-analyzer-kuromoji.min.js"></script>
    
    <style>
        /* 稍微拉开一点注音和汉字之间的距离，方便阅读 */
        ruby {
            ruby-position: over;
        }
        rt {
            font-size: 0.6em;
            color: #4a4a4a;
            padding-bottom: 0.2em;
        }
        #output {
            font-size: 24px;
            line-height: 2;
            min-height: 100px;
        }
    </style>
</head>
<body>
    <section class="section">
        <div class="container">
            <h1 class="title">日语片假名注音 (Furigana) 工具</h1>
            
            <div id="status" class="notification is-warning">
                正在下载并初始化词典文件（约 17MB），请稍候...
            </div>

            <div class="field">
                <label class="label">输入日文汉字：</label>
                <div class="control">
                    <textarea id="input-text" class="textarea" rows="4" disabled>日本語の漢字にカタカナのルビを振ります。今日もいい天気ですね！</textarea>
                </div>
            </div>

            <div class="field">
                <button id="convert-btn" class="button is-link" disabled>转换为片假名注音</button>
            </div>

            <div class="box mt-5">
                <h3 class="title is-5">注音结果：</h3>
                <div id="output" class="content"></div>
            </div>
        </div>
    </section>

    <script>
        // 初始化 Kuroshiro 和 分析器
        const kuroshiro = new Kuroshiro.default();
        // 使用 UNPKG 提供的远程词典路径（注意：国内网络下载这 17MB 可能会有几秒钟延迟）
        const analyzer = new KuromojiAnalyzer({
            dictPath: "https://unpkg.com/kuromoji/dict/"
        });

        const statusDiv = document.getElementById('status');
        const inputText = document.getElementById('input-text');
        const convertBtn = document.getElementById('convert-btn');
        const outputDiv = document.getElementById('output');

        // 异步初始化
        async function initKuroshiro() {
            try {
                await kuroshiro.init(analyzer);
                
                // 初始化成功，启用输入框和按钮
                statusDiv.className = "notification is-success";
                statusDiv.innerText = "词典加载成功！可以开始测试了。";
                inputText.removeAttribute('disabled');
                convertBtn.removeAttribute('disabled');
            } catch (error) {
                statusDiv.className = "notification is-danger";
                statusDiv.innerText = "词典加载失败，请刷新重试或检查网络联通性。";
                console.error(error);
            }
        }

        // 转换逻辑
        async function handleConvert() {
            const text = inputText.value.trim();
            if (!text) return;

            convertBtn.classList.add('is-loading');
            try {
                // 核心转换代码
                const result = await kuroshiro.convert(text, {
                    mode: "furigana", // 输出为带 ruby 标签的注音格式
                    to: "katakana"    // 明确指定注音为 片假名
                });
                
                // 将生成的 HTML 注入到页面中
                outputDiv.innerHTML = result;
            } catch (error) {
                alert("转换出错，请看控制台。");
                console.error(error);
            } finally {
                convertBtn.classList.remove('is-loading');
            }
        }

        // 绑定事件
        convertBtn.addEventListener('click', handleConvert);

        // 页面加载时自动初始化
        initKuroshiro();
    </script>
</body>
</html>
