<!DOCTYPE html>
<html>
  <head>
    <title>Options</title>
    <style>
    </style>
  </head>
  <body>
    <div>
      <label for="serverURL">
        Server URL:
        <input id="serverURL" type="text" value=""/>
      </label>
      <button id="publicServerButton">Use public server</button>
      <button id="localServerButton">Use local server</button>
    </div>
    <div>
      <label id="imagetransInstanceLabel">
        Display name of ImageTrans instance:
        <input id="imagetransInstanceInput" type="text" placeholder="default" />
      </label>
      <button id="checkInstanceButton">Check existing instances</button>
    </div>
    <div>
      <label id="imagetransPasswordLabel">
        Password for ImageTrans instance (optional):
        <input id="imagetransPasswordInput" type="password" />
      </label>
    </div>
    <div>
      <label>
        Source lang:
        <select id="sourceLangSelect">
        </select>
      </label>
      <br/>
      <label>
        Target lang:
        <select id="targetLangSelect">
        </select>
      </label>
    </div>
    <div>
      <label for="serverURL">The way to pick an image:
        <select id="pickingWay">
            <option value="0">Behind Mouse Cursor</option>
            <option value="1">Center of the Screen</option>
        </select>
      </label>
    </div>
    <div>
      <label for="useCanvas">
        Use Canvas to get image data by default:
        <input id="useCanvas" type="checkbox" checked/>
      </label>
    </div>
    <div>
      <label for="useCORS">
        Enable CORS headers for images (allow translating cross-domain images):
        <input id="useCORS" type="checkbox" checked/>
      </label>
    </div>
    <div>
      <label for="renderTextInFrontend">
        Render text in the front-end:
        <input id="renderTextInFrontend" type="checkbox" checked/>
      </label>
    </div>
    <div>
      <label for="ocrMode">
        OCR mode:
        <select id="ocrMode">
          <option value="remote">Remote Server</option>
          <option value="local">Local (ONNX)</option>
        </select>
      </label>
    </div>
    <div>
      <label for="translationMode">
        Translation mode:
        <select id="translationMode">
          <option value="mymemory">MyMemory (Free)</option>
          <option value="remote">Remote Server</option>
        </select>
      </label>
    </div>
    <div id="localOcrNote" style="display:none; color:#666; margin-top:8px; max-width:400px;">
      Local OCR runs ONNX models in the browser. First use will be slow while models load (~123MB).
      Subsequent translations will be faster.
    </div>
    <button id="saveButton">Save</button>
    <div style="margin-top:20px;">
      For more info, please visit ImageTrans's <a href="https://www.basiccat.org/imagetrans">homepage</a>.
    </div>
    <script src="options.js"></script>
  </body>
</html>
